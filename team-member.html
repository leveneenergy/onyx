<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Team Member — Levene Energies Limited</title>
  <meta id="page-desc" name="description" content="Leadership profile — Levene Energies Limited Limited."/>
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">

  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    .profile-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 5% 7rem;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 4rem;
      align-items: start;
    }
    .profile-photo-col {
      position: sticky;
      top: 100px;
    }
    .profile-photo {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow-deep);
      background: var(--smoke);
    }
    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background-color: #174caa;
    }
    .profile-photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      color: rgba(255,255,255,0.12);
    }
    .profile-social {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .profile-social a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.55rem 1rem;
      border-radius: var(--radius);
      transition: var(--transition);
      border: 1.5px solid var(--smoke);
      color: var(--navy);
    }
    .profile-social a:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    .profile-content-col {}
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 2.5rem;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--navy); }

    .profile-role {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .profile-role::before {
      content: '';
      width: 32px;
      height: 2px;
      background: var(--green);
    }
    .profile-name {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 600;
      color: var(--navy);
      line-height: 1.1;
      margin-bottom: 2rem;
    }
    .profile-divider {
      width: 48px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin-bottom: 2rem;
    }
    .profile-bio p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 1.02rem;
      margin-bottom: 1.4rem;
    }
    .profile-bio h2, .profile-bio h3 {
      font-family: var(--font-display);
      color: var(--navy);
      margin: 2rem 0 0.75rem;
    }
    .profile-bio ul {
      list-style: disc;
      padding-left: 1.5rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .profile-bio ul li { margin-bottom: 0.4rem; line-height: 1.75; }

    .profile-loading {
      text-align: center;
      padding: 8rem 5%;
      color: var(--muted);
    }
    .profile-loading i {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 900px) {
      .profile-wrap {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
      .profile-photo-col { position: static; }
      .profile-photo { max-width: 280px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="header-placeholder"></div>

<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header not found');
      return r.text();
    })
    .then(html => document.getElementById('header-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load header:', err));
</script>

<!-- Profile Content -->
<div id="page-wrap">
  <div class="profile-loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading profile...</p>
  </div>
</div>

<!-- CTA Band -->
<section class="cta-band">
  <h2>Get in touch</h2>
  <p>Interested in working with the Levene Energies Limited leadership team?</p>
  <a href="contact.html" class="btn btn--green">Contact Us <i class="fas fa-arrow-right"></i></a>
  <a href="management.html" class="btn btn--outline">Full Team</a>
</section>
<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<!-- Mobile Nav -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navList   = document.getElementById('nav-list');
  const navClose  = document.getElementById('nav-close');

  if (hamburger && navList) {
    hamburger.addEventListener('click', e => {
      e.stopPropagation();
      navList.classList.add('open');
    });
  }

  if (navClose) {
    navClose.addEventListener('click', () => {
      navList.classList.remove('open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
    });
  }

  document.querySelectorAll('.nav-list .dropdown > a').forEach(link => {
    link.addEventListener('click', e => {
      if (window.innerWidth > 768) return;
      e.preventDefault();
      e.stopPropagation();
      const dropdown = link.closest('.dropdown');
      const isOpen = dropdown.classList.contains('mob-open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      if (!isOpen) dropdown.classList.add('mob-open');
    });
  });
});
</script>

<!-- Profile Loading & Rendering -->
<script>
// ── Helpers ──
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>Biography coming soon.</p>';
  return blocks
    .map(b => {
      if (b._type !== 'block') return '';
      const text = (b.children || [])
        .map(c => {
          let t = esc(c.text || '');
          if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
          if (c.marks?.includes('em')) t = `<em>${t}</em>`;
          const link = b.markDefs?.find(d => c.marks?.includes(d._key));
          return link?.href ? `<a href="${esc(link.href)}" target="_blank" rel="noopener">${t}</a>` : t;
        })
        .join('');
      const s = b.style || 'normal';
      if (['h2','h3','h4'].includes(s)) return `<${s}>${text}</${s}>`;
      if (s === 'blockquote') return `<blockquote>${text}</blockquote>`;
      return `<p>${text}</p>`;
    })
    .join('');
}

function paint(p) {
  document.title = `${p.name} — Levene Energies Limited`;
  document.getElementById('page-desc').content = `${p.designation || ''} — Levene Energies Limited Leadership`;

  const photoSrc = p.photoUrl ? `${p.photoUrl}?w=680&auto=format&fit=crop&q=85` : null;
  const bioHtml = p.biography
    ? ptToHtml(p.biography)
    : p.bio
      ? p.bio.split('\n\n').map(t => `<p>${esc(t)}</p>`).join('')
      : '<p>Biography coming soon.</p>';

  document.getElementById('page-wrap').innerHTML = `
  <div style="background:var(--off-white);padding:1rem 5%;">
    <div style="max-width:1100px;margin:0 auto;">
      <div class="breadcrumb">
        <a href="index.html">Home</a><span>/</span>
        <a href="management.html">Management</a><span>/</span>
        <span>${esc(p.name)}</span>
      </div>
    </div>
  </div>

  <div class="profile-wrap">
    <div class="profile-photo-col">
      <div class="profile-photo">
        ${photoSrc
          ? `<img src="${photoSrc}" alt="${esc(p.name)}"/>`
          : `<div class="profile-photo-placeholder" style="background:linear-gradient(135deg,var(--navy),var(--navy-mid))"><i class="fas fa-user"></i></div>`}
      </div>
      <div class="profile-social">
        ${p.linkedin ? `<a href="${esc(p.linkedin)}" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
        ${p.email ? `<a href="mailto:${esc(p.email)}"><i class="fas fa-envelope"></i> Email</a>` : ''}
      </div>
    </div>

    <div class="profile-content-col">
      <a href="management.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Team</a>
      <div class="profile-role">${esc(p.designation || '')}</div>
      <h1 class="profile-name">${esc(p.name)}</h1>
      <div class="profile-divider"></div>
      <div class="profile-bio rich-text">${bioHtml}</div>
    </div>
  </div>`;
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) {
    location.href = 'management.html';
    return;
  }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="management" && (slug.current=="${slug}" || _id=="${slug}")][0]{
    name,
    designation,
    "photoUrl": photo.asset->url,
    biography,
    linkedin,
    email
  }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();

    if (data.result) {
      paint(data.result);
      return;
    }
  } catch (err) {
    console.error('Profile fetch error:', err);
  }

  // Fallback UI
  document.getElementById('page-wrap').innerHTML = `
    <div style="text-align:center;padding:8rem 5%;color:var(--muted);">
      <i class="fas fa-user-times" style="font-size:4rem;margin-bottom:1.5rem;"></i>
      <h2>Profile Not Found</h2>
      <p style="margin:1.5rem 0;">The requested team member profile could not be found.</p>
      <a href="management.html" class="btn btn--primary">View Full Team</a>
    </div>`;
})();
</script>

</body>
</html>
