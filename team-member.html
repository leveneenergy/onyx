<body>
<div id="header-placeholder"></div>

<script>

  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav(); 
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');

    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navList.classList.add('open');
        document.body.style.overflow = 'hidden'; 
      });
    }

    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open');
        document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
      });
    }

   
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
            d.classList.remove('mob-open');
          });
        }
      }
    });


    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen   = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });

    
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navList   = document.getElementById('nav-list');
  const navClose  = document.getElementById('nav-close');

  if (hamburger && navList) {
    hamburger.addEventListener('click', e => {
      e.stopPropagation();
      navList.classList.add('open');
    });
  }

  if (navClose) {
    navClose.addEventListener('click', () => {
      navList.classList.remove('open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
    });
  }

  document.querySelectorAll('.nav-list .dropdown > a').forEach(link => {
    link.addEventListener('click', e => {
      if (window.innerWidth > 768) return;
      e.preventDefault();
      e.stopPropagation();
      const dropdown = link.closest('.dropdown');
      const isOpen = dropdown.classList.contains('mob-open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      if (!isOpen) dropdown.classList.add('mob-open');
    });
  });
});
</script>


<script>
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>Biography coming soon.</p>';
  return blocks
    .map(b => {
      if (b._type !== 'block') return '';
      const text = (b.children || [])
        .map(c => {
          let t = esc(c.text || '');
          if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
          if (c.marks?.includes('em')) t = `<em>${t}</em>`;
          const link = b.markDefs?.find(d => c.marks?.includes(d._key));
          return link?.href ? `<a href="${esc(link.href)}" target="_blank" rel="noopener">${t}</a>` : t;
        })
        .join('');
      const s = b.style || 'normal';
      if (['h2','h3','h4'].includes(s)) return `<${s}>${text}</${s}>`;
      if (s === 'blockquote') return `<blockquote>${text}</blockquote>`;
      return `<p>${text}</p>`;
    })
    .join('');
}

function paint(p) {
  document.title = `${p.name} — Levene Energies Limited`;
  document.getElementById('page-desc').content = `${p.designation || ''} — Levene Energies Limited Leadership`;

  const photoSrc = p.photoUrl ? `${p.photoUrl}?w=680&auto=format&fit=crop&q=85` : null;
  const bioHtml = p.biography
    ? ptToHtml(p.biography)
    : p.bio
      ? p.bio.split('\n\n').map(t => `<p>${esc(t)}</p>`).join('')
      : '<p>Biography coming soon.</p>';

  document.getElementById('page-wrap').innerHTML = `
  <div style="background:var(--off-white);padding:1rem 5%;">
    <div style="max-width:1100px;margin:0 auto;">
      <div class="breadcrumb">
        <a href="index.html">Home</a><span>/</span>
        <a href="management.html">Management</a><span>/</span>
        <span>${esc(p.name)}</span>
      </div>
    </div>
  </div>

  <div class="profile-wrap">
    <div class="profile-photo-col">
      <div class="profile-photo">
        ${photoSrc
          ? `<img src="${photoSrc}" alt="${esc(p.name)}"/>`
          : `<div class="profile-photo-placeholder" style="background:linear-gradient(135deg,var(--navy),var(--navy-mid))"><i class="fas fa-user"></i></div>`}
      </div>
      <div class="profile-social">
        ${p.linkedin ? `<a href="${esc(p.linkedin)}" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
        ${p.email ? `<a href="mailto:${esc(p.email)}"><i class="fas fa-envelope"></i> Email</a>` : ''}
      </div>
    </div>

    <div class="profile-content-col">
      <a href="management.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Team</a>
      <div class="profile-role">${esc(p.designation || '')}</div>
      <h1 class="profile-name">${esc(p.name)}</h1>
      <div class="profile-divider"></div>
      <div class="profile-bio rich-text">${bioHtml}</div>
    </div>
  </div>`;
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) { location.href = 'management.html'; return; }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="management" && (slug.current=="${slug}" || _id=="${slug}")][0]{
    name,
    designation,
    "photoUrl": photo.asset->url,
    biography,
    linkedin,
    email
  }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();
    if (data.result) { paint(data.result); return; }
  } catch (err) {
    console.error('Profile fetch error:', err);
  }

  document.getElementById('page-wrap').innerHTML = `
    <div style="text-align:center;padding:8rem 5%;color:var(--muted);">
      <i class="fas fa-user-times" style="font-size:4rem;margin-bottom:1.5rem;"></i>
      <h2>Profile Not Found</h2>
      <p style="margin:1.5rem 0;">The requested team member profile could not be found.</p>
      <a href="management.html" class="btn btn--primary">View Full Team</a>
    </div>`;
})();
</script>
