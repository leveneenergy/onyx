<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Team Member - Levene Energies Limited</title>
    <meta name="description" id="page-desc" content="Leadership profile - Levene Energies Limited." />
    <meta name="author" content="Levene Energies Limited" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" id="og-title" content="Team Member" />
    <meta property="og:description" id="og-description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:image" id="og-image" content="" />
    <meta property="og:site_name" content="Levene Energies Limited" />
    <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/team-member.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>

  <body>
    <div id="header-placeholder"></div>
   <script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav(); 
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');

    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navList.classList.add('open');
        document.body.style.overflow = 'hidden'; 
      });
    }

    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open');
        document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
      });
    }

   
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
            d.classList.remove('mob-open');
          });
        }
      }
    });


    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen   = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });

    
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }
</script>


    <!-- ── Profile body (populated from Sanity) ── -->
    <div id="profile-root">
      <div class="profile-loading">
        <i class="fas fa-spinner fa-spin" style="color:var(--navy);opacity:0.4;"></i>
        <p>Loading profile…</p>
      </div>
    </div>
<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>


    <script>
      // ── Helpers ──────────────────────────────────────────────
      function esc(s) {
        return String(s || "")
          .replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;");
      }

      function ptToHtml(blocks) {
        if (!blocks?.length) return "<p>Detailed content coming soon.</p>";
        let html = "";
        let listItems = [];

        blocks.forEach((block) => {
          if (listItems.length && !block.listItem) {
            html += "<ul>" + listItems.join("") + "</ul>";
            listItems = [];
          }
          if (block._type !== "block") return;
          const text = (block.children || []).map((child) => {
            let t = esc(child.text || "");
            if (child.marks?.includes("strong")) t = `<strong>${t}</strong>`;
            if (child.marks?.includes("em")) t = `<em>${t}</em>`;
            const linkDef = block.markDefs?.find(d => child.marks?.includes(d._key));
            return linkDef?.href ? `<a href="${esc(linkDef.href)}" target="_blank">${t}</a>` : t;
          }).join("");
          if (block.listItem) { listItems.push(`<li>${text}</li>`); return; }
          const s = block.style || "normal";
          if (s === "h2")              html += `<h2>${text}</h2>`;
          else if (s === "h3")         html += `<h3>${text}</h3>`;
          else if (s === "h4")         html += `<h4>${text}</h4>`;
          else if (s === "blockquote") html += `<blockquote>${text}</blockquote>`;
          else                         html += `<p>${text}</p>`;
        });
        if (listItems.length) html += "<ul>" + listItems.join("") + "</ul>";
        return html;
      }

      // ── Category → back-link mapping ─────────────────────────
      const CATEGORY_META = {
        "board-of-directors": {
          label: "Board of Directors",
          href:  "./management.html#board",
        },
        "executive-team": {
          label: "Executive Team",
          href:  "./management.html#executive",
        },
      };

      // ── Scroll-reveal for rich-text ──────────────────────────
      function initScrollReveal() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("revealed");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll(
          ".rich-text p, .rich-text h2, .rich-text h3, .rich-text h4, .rich-text ul, .rich-text blockquote"
        ).forEach(el => observer.observe(el));
      }

      // ── Paint profile ─────────────────────────────────────────
      function paint(m) {
        document.title = `${m.name} - Levene Energies Limited`;
        document.getElementById("page-desc").content      = m.excerpt || m.title || "";
        document.getElementById("og-title").content       = m.name;
        document.getElementById("og-description").content = m.excerpt || "";
        if (m.photoUrl) document.getElementById("og-image").content = m.photoUrl;

        const cat = CATEGORY_META[m.category] || { label: "Management Team", href: "./management.html" };

        const photoInner = m.photoUrl
          ? `<img src="${esc(m.photoUrl)}?w=800&auto=format&fit=crop&q=82" alt="${esc(m.name)}" loading="lazy" />`
          : `<div class="img-placeholder"><i class="fas fa-user"></i></div>`;

        const socialLinks = [
          m.linkedin ? `<a href="${esc(m.linkedin)}" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i> LinkedIn</a>` : "",
          m.email    ? `<a href="mailto:${esc(m.email)}"><i class="fas fa-envelope"></i> Email</a>` : "",
        ].filter(Boolean).join("");

        const bioHtml = Array.isArray(m.fullBio) && m.fullBio.length
          ? ptToHtml(m.fullBio)
          : m.excerpt
            ? `<p>${esc(m.excerpt)}</p>`
            : "<p>Full biography coming soon.</p>";

        const excerptHtml = (m.excerpt && Array.isArray(m.fullBio) && m.fullBio.length)
          ? `<div class="profile-excerpt">${esc(m.excerpt)}</div>`
          : "";

        document.getElementById("profile-root").innerHTML = `
          <div class="sub-body-wrap">
            <div class="sub-main-content">
              <div class="sub-main-grid">

                <!-- Left: sticky photo column -->
                <div class="sub-main-image">
                  <div class="img-bracket-wrap">${photoInner}</div>
                  <div class="sub-back-actions">
                    <a href="${esc(cat.href)}" class="back-link">
                      <i class="fas fa-arrow-left"></i> Back to ${esc(cat.label)}
                    </a>
                  </div>
                  ${socialLinks ? `<div class="profile-social">${socialLinks}</div>` : ""}
                </div>

                <!-- Right: bio column -->
                <div class="sub-main-text">
                  <div class="profile-role">${esc(m.title || "")}</div>
                  <h1 class="profile-name">${esc(m.name)}</h1>
                  <div class="profile-divider"></div>
                  ${excerptHtml}
                  <div class="rich-text">${bioHtml}</div>
                </div>

              </div>
            </div>
          </div>`;

        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add("visible"); io.unobserve(e.target); }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll(".sub-main-image, .sub-main-text").forEach(el => io.observe(el));

        requestAnimationFrame(() => initScrollReveal());
      }

      function showError() {
        document.getElementById("profile-root").innerHTML = `
          <div class="profile-loading">
            <i class="fas fa-exclamation-circle" style="color:var(--navy);opacity:0.3;font-size:3rem;"></i>
            <h2 style="font-family:var(--font-display);color:var(--navy);margin:1rem 0;">Profile Not Found</h2>
            <p>This team member's profile hasn't been added yet.</p>
            <a href="./index.html" class="btn btn--primary" style="margin-top:2rem;">Back to Home</a>
          </div>`;
      }

      // ── Fetch from Sanity ─────────────────────────────────────
      (async () => {
        const slug = new URLSearchParams(location.search).get("slug")?.trim();
        if (!slug) { location.href = "./index.html"; return; }

        const BASE = "https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production";
        const q = `*[_type=="teamMember" && slug.current=="${slug}"][0]{
          name, title, category, excerpt, fullBio, linkedin, email,
          "slug": slug.current,
          "photoUrl": photo.asset->url
        }`;

        try {
          const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
          if (!res.ok) throw new Error("Fetch failed");
          const { result } = await res.json();
          if (result) paint(result);
          else showError();
        } catch (err) {
          console.error(err);
          showError();
        }
      })();
    </script>
  </body>
</html>
