<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Blog - Levene Energies Limited</title>
  <meta name="description" id="page-desc" content="Read the latest insights from Levene Energies Limited."/>
  <meta name="keywords" content="energy, insights, blog, Levene Energies"/>
  <meta name="author" content="Levene Energies Limited"/>
  <meta name="robots" content="index, follow"/>
  <meta name="language" content="English"/>
  <meta property="og:type" id="og-type" content="article"/>
  <meta property="og:title" id="og-title" content="Blog - Levene Energies Limited"/>
  <meta property="og:description" id="og-description" content="Read the latest insights from Levene Energies Limited."/>
  <meta property="og:image" id="og-image" content=""/>
  <meta property="og:url" id="og-url" content=""/>
  <meta property="og:site_name" content="Levene Energies Limited"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" id="twitter-title" content="Blog - Levene Energies Limited"/>
  <meta name="twitter:description" id="twitter-description" content="Read the latest insights from Levene Energies Limited."/>
  <meta name="twitter:image" id="twitter-image" content=""/>
  <link rel="canonical" id="canonical-url" href=""/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://ilajnehi.apicdn.sanity.io">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="./css/post.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="header-placeholder"></div>
<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav(); 
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');

    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navList.classList.add('open');
        document.body.style.overflow = 'hidden'; 
      });
    }

    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open');
        document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
      });
    }

   
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
            d.classList.remove('mob-open');
          });
        }
      }
    });


    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen   = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });

    
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }
</script>

<div id="pr-hero-wrap">
  <div class="pr-loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading article...</p>
  </div>
</div>

<div id="pr-body-wrap"></div>

<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<script>
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(d) {
  return d ? new Date(d).toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' }) : '';
}
function improveImageUrl(url, width = 900) {
  if (!url) return '';
  return `${url}?w=${width}&auto=format&fit=crop&q=80`;
}

function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>No content available.</p>';
  let html = '';
  let listItems = [];
  blocks.forEach(block => {
    if (listItems.length && !block.listItem) { html += '<ul>' + listItems.join('') + '</ul>'; listItems = []; }
    if (block._type === 'image' && block.asset?.url) {
      const src = improveImageUrl(block.asset.url, 900);
      html += `<figure><img src="${src}" alt="${esc(block.alt || 'Image')}" loading="lazy" style="width:100%;display:block;margin:1.5rem 0;opacity:0;transition:opacity 0.65s ease;" onload="this.style.opacity=1"/>${block.caption ? `<figcaption style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;font-style:italic;">${esc(block.caption)}</figcaption>` : ''}</figure>`;
      return;
    }
    if (block._type !== 'block') return;
    const text = (block.children || []).map(c => {
      let t = esc(c.text || '');
      if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
      if (c.marks?.includes('em')) t = `<em>${t}</em>`;
      const linkDef = block.markDefs?.find(d => c.marks?.includes(d._key));
      return linkDef?.href ? `<a href="${esc(linkDef.href)}" target="_blank">${t}</a>` : t;
    }).join('');
    if (block.listItem) { listItems.push(`<li>${text}</li>`); return; }
    const style = block.style || 'normal';
    if (['h2','h3','h4'].includes(style)) html += `<${style}>${text}</${style}>`;
    else if (style === 'blockquote') html += `<blockquote>${text}</blockquote>`;
    else html += `<p>${text}</p>`;
  });
  if (listItems.length) html += '<ul>' + listItems.join('') + '</ul>';
  return html;
}

function initScrollReveal() {
  const els = document.querySelectorAll('.pr-body p, .pr-body h2, .pr-body h3, .pr-body h4, .pr-body ul, .pr-body blockquote');
  if (!els.length) return;
  let delay = 0;
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.transitionDelay = `${delay}s`;
        delay = Math.min(delay + 0.04, 0.3);
        entry.target.classList.add('revealed');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  els.forEach(el => io.observe(el));
}

function paint(post) {
  const pageTitle = `${post.title} — Levene Energies Limited`;
  const baseUrl = window.location.origin + window.location.pathname;
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  const postUrl = slug ? `${baseUrl}?slug=${encodeURIComponent(slug)}` : baseUrl;

  document.getElementById('page-title').textContent = pageTitle;
  document.getElementById('page-desc').content = post.excerpt || post.title;
  document.getElementById('og-title').content = pageTitle;
  document.getElementById('og-description').content = post.excerpt || post.title;
  document.getElementById('og-url').content = postUrl;
  if (post.imageUrl) { document.getElementById('og-image').content = improveImageUrl(post.imageUrl, 1200); }
  document.getElementById('twitter-title').content = pageTitle;
  document.getElementById('twitter-description').content = post.excerpt || post.title;
  if (post.imageUrl) { document.getElementById('twitter-image').content = improveImageUrl(post.imageUrl, 1200); }
  document.getElementById('canonical-url').href = postUrl;

  const structuredData = {
    "@context": "https://schema.org", "@type": "Article",
    "headline": post.title, "description": post.excerpt || post.title,
    "image": post.imageUrl ? improveImageUrl(post.imageUrl, 1200) : undefined,
    "datePublished": post.publishedAt || new Date().toISOString(),
    "dateModified": post.publishedAt || new Date().toISOString(),
    "author": { "@type": "Organization", "name": "Levene Energies Limited", "url": window.location.origin },
    "publisher": { "@type": "Organization", "name": "Levene Energies Limited", "logo": { "@type": "ImageObject", "url": window.location.origin + "/image/levene-energies.png" } }
  };
  Object.keys(structuredData).forEach(key => structuredData[key] === undefined && delete structuredData[key]);
  let scriptTag = document.querySelector('script[type="application/ld+json"]');
  if (!scriptTag) { scriptTag = document.createElement('script'); scriptTag.type = 'application/ld+json'; document.head.appendChild(scriptTag); }
  scriptTag.textContent = JSON.stringify(structuredData);

  const breadcrumbSchema = {
    "@context": "https://schema.org", "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": window.location.origin },
      { "@type": "ListItem", "position": 2, "name": "Blog", "item": window.location.origin + "/media.html#blog" },
      { "@type": "ListItem", "position": 3, "name": post.title, "item": postUrl }
    ]
  };
  let breadcrumbScript = document.querySelector('script[data-breadcrumb]');
  if (!breadcrumbScript) { breadcrumbScript = document.createElement('script'); breadcrumbScript.type = 'application/ld+json'; breadcrumbScript.setAttribute('data-breadcrumb', 'true'); document.head.appendChild(breadcrumbScript); }
  breadcrumbScript.textContent = JSON.stringify(breadcrumbSchema);

  const imgQ = post.imageUrl ? improveImageUrl(post.imageUrl, 1400) : '';

  document.getElementById('pr-hero-wrap').innerHTML = `
  <section class="pr-hero">
    ${imgQ ? `<img class="pr-hero-bg" alt="${esc(post.title)}"/>` : ''}
    <div class="pr-hero-overlay"></div>
    <div class="pr-hero-content">
      <span class="pr-label"><i class="fas fa-feather-alt"></i> Article</span>
      <h1>${esc(post.title)}</h1>
      <div class="pr-hero-meta">
        ${post.publishedAt ? `<span><i class="fas fa-calendar"></i> ${fmt(post.publishedAt)}</span>` : ''}
      </div>
      <div class="breadcrumb" style="margin-top:2rem;">
        <a href="./index.html">Home</a><span>/</span>
        <a href="./media.html#blog">Blog</a><span>/</span>
        <span class="current">${esc(post.title)}</span>
      </div>
    </div>
  </section>`;

  if (imgQ) {
    const heroBg = document.querySelector('.pr-hero-bg');
    if (heroBg) { const tmp = new Image(); tmp.onload = () => { heroBg.src = imgQ; heroBg.classList.add('loaded'); }; tmp.src = imgQ; }
  }

  const bodyHtml = post.content?.length
    ? ptToHtml(post.content)
    : post.excerpt ? `<p>${esc(post.excerpt)}</p>`
    : '<p style="font-style:italic;">No content available for this article.</p>';

  const imgSrc = post.imageUrl ? improveImageUrl(post.imageUrl, 900) : '';
  const imgColHtml = imgSrc
    ? `<div class="pr-img-wrap"><img alt="${esc(post.title)}" loading="lazy"/></div>`
    : `<div class="pr-img-wrap"><div class="pr-img-placeholder"><i class="fas fa-image"></i></div></div>`;

  document.getElementById('pr-body-wrap').innerHTML = `
  <div class="pr-outer">
    <a href="./media.html#blog" class="back-link"><i class="fas fa-arrow-left"></i> Back to Blog</a>
    <div class="pr-columns">
      ${imgColHtml}
      <div class="pr-panel">
        <p class="pr-panel-label">Latest Article</p>
        <hr class="pr-panel-rule"/>
        <h1 class="pr-panel-title">${esc(post.title)}</h1>
        <div class="pr-meta">
          ${post.publishedAt ? `<span><i class="fas fa-calendar-day"></i> ${fmt(post.publishedAt)}</span>` : ''}
        </div>
        <div class="pr-body">${bodyHtml}</div>
        <div class="pr-actions">
          <a href="./media.html#blog" class="btn btn--outline-dark">All Articles</a>
        </div>
      </div>
    </div>
  </div>`;

  if (imgSrc) {
    const colImg = document.querySelector('.pr-img-wrap img');
    if (colImg) { const tmp2 = new Image(); tmp2.onload = () => { colImg.src = imgSrc; colImg.classList.add('loaded'); }; tmp2.src = imgSrc; }
  }

  requestAnimationFrame(initScrollReveal);
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) {
    document.getElementById('pr-hero-wrap').innerHTML = '';
    document.getElementById('pr-body-wrap').innerHTML = `<div class="pr-loading"><i class="fas fa-exclamation-circle"></i><h2 style="color:var(--navy);margin-bottom:1rem;">No article selected</h2><p>Please choose a post from the <a href="./media.html#blog">blog</a>.</p></div>`;
    return;
  }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="post" && slug.current=="${slug}"][0]{ title, excerpt, publishedAt, "imageUrl": mainImage.asset->url, content }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();
    if (!data.result) throw new Error('Post not found');
    paint(data.result);
  } catch (err) {
    console.error('Post load error:', err);
    document.getElementById('pr-hero-wrap').innerHTML = '';
    document.getElementById('pr-body-wrap').innerHTML = `<div class="pr-loading"><i class="fas fa-exclamation-triangle"></i><h2 style="color:var(--navy);margin-bottom:1rem;">Article Not Found</h2><p style="margin-bottom:2rem;">This post may have been removed or is not available.</p><a href="./media.html#blog" class="btn btn--primary">Back to Blog</a></div>`;
  }
})();
</script>

</body>
</html>
