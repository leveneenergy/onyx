<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Blog-Levene Energies Limited</title>
  <meta name="description" id="page-desc" content="Read the latest insights from Levene Energies Limited."/>
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

   

    .pr-loading {
      text-align: center;
      padding: 8rem 5%;
      color: var(--muted);
    }
    .pr-loading i {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
      display: block;
      color: var(--smoke);
    }

    .pr-outer {
      max-width: 1280px;
      margin: 0 auto;
      padding: 4rem 5% 6rem;
    }
    .pr-columns {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 3.5rem;
      align-items: start;
    }

   
    .pr-img-wrap {
      position: sticky;
      top: 6rem;
      align-self: start;
      overflow: hidden;
      animation: slideInLeft 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: 0.15s;
    }
    
    .pr-img-wrap img.loaded {
      opacity: 1;
      transform: scale(1);
    }
   
    .pr-img-placeholder i { font-size: 4rem; color: rgba(255,255,255,0.1); }

    /* ── Right: panel ── */
    .pr-panel {
      background: none;
      padding: 0;
      animation: slideInRight 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: 0.25s;
    }

    .pr-panel-label {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      background: linear-gradient(
        90deg,
        var(--navy, #041844) 0%,
        var(--navy, #041844) 35%,
        var(--gold, #c9a84c) 50%,
        var(--navy, #041844) 65%,
        var(--navy, #041844) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3.5s linear 0.8s both;
    }

    .pr-panel-rule {
      border: none;
      border-top: 2px solid var(--green);
      margin: 0 0 1.75rem;
      transform-origin: left;
      animation: barGrow 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    .pr-panel-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin: 0 0 0.65rem;
      line-height: 1.4;
      letter-spacing: -0.015em;
    }

    .pr-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      letter-spacing: 0.025em;
    }
    .pr-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .pr-meta i { color: var(--green); }

    .pr-body p {
      font-size: 0.97rem;
      line-height: 1.9;
      color: var(--muted);
      margin: 0 0 0.3rem;
      letter-spacing: 0.01em;
    }

    .pr-body > p:first-of-type::first-letter {
      float: left;
      font-family: var(--font-display);
      font-size: 3.2em;
      line-height: 0.82;
      font-weight: 700;
      color: var(--navy);
      margin: 0.05em 0.12em 0 0;
    }

    .pr-body h2,
    .pr-body h3,
    .pr-body h4 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin: 1rem 0 0.4rem;
      letter-spacing: -0.01em;
      padding-left: 0.75rem;
      border-left: 3px solid var(--green);
    }

    .pr-body ul {
      list-style: none;
      padding-left: 0;
      color: var(--muted);
      margin: 0 0 0.3rem;
    }
    .pr-body ul li {
      margin-bottom: 0.45rem;
      line-height: 1.75;
      font-size: 0.97rem;
      padding-left: 1.4rem;
      position: relative;
    }
    .pr-body ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.6em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold, #c9a84c);
    }

   
    .pr-body strong {
      color: var(--text);
      font-weight: 700;
      
    }

    .pr-body a {
      color: var(--navy);
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .pr-body a:hover { color: var(--green); }

    .pr-body p,
    .pr-body h2, .pr-body h3, .pr-body h4,
    .pr-body ul,
    .pr-body blockquote {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .pr-body .revealed {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    .pr-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--smoke);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s, gap 0.2s;
    }
    .back-link:hover { color: var(--navy); gap: 0.75rem; }
    .back-link i { transition: transform 0.2s; }
    .back-link:hover i { transform: translateX(-3px); }

    @media (max-width: 860px) {
      .pr-columns { grid-template-columns: 1fr; gap: 2rem; }
      /* disable sticky on mobile — image scrolls normally */
      .pr-img-wrap {
        position: relative;
        top: auto;
        margin-top: 0;
        animation-name: fadeUp;
      }
      .pr-panel    { animation-name: fadeUp; animation-delay: 0.3s; }
      .pr-img-wrap img, .pr-img-placeholder { height: 280px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .pr-body p,
      .pr-body h2, .pr-body h3, .pr-body h4,
      .pr-body ul, .pr-body blockquote {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
<div id="header-placeholder"></div>

<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav();
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');
    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation(); navList.classList.add('open'); document.body.style.overflow = 'hidden';
      });
    }
    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open'); document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
      });
    }
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open'); document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
        }
      }
    });
    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault(); e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open'); document.body.style.overflow = '';
      });
    });
  }
</script>

<!-- Hero -->
<div id="pr-hero-wrap">
  <div class="pr-loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading article...</p>
  </div>
</div>

<!-- Body -->
<div id="pr-body-wrap"></div>

<div id="footer-placeholder"></div>
<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navList   = document.getElementById('nav-list');
  const navClose  = document.getElementById('nav-close');
  if (hamburger && navList) hamburger.addEventListener('click', e => { e.stopPropagation(); navList.classList.add('open'); });
  if (navClose) navClose.addEventListener('click', () => {
    navList.classList.remove('open');
    document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
  });
  document.querySelectorAll('.nav-list .dropdown > a').forEach(link => {
    link.addEventListener('click', e => {
      if (window.innerWidth > 768) return;
      e.preventDefault(); e.stopPropagation();
      const dropdown = link.closest('.dropdown');
      const isOpen = dropdown.classList.contains('mob-open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      if (!isOpen) dropdown.classList.add('mob-open');
    });
  });
});
</script>

<script>
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(d) {
  return d ? new Date(d).toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' }) : '';
}
function improveImageUrl(url, width = 900) {
  if (!url) return '';
  return `${url}?w=${width}&auto=format&fit=crop&q=80`;
}

function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>No content available.</p>';
  let html = '';
  let listItems = [];
  
  blocks.forEach(block => {
    // Flush list items if we hit a non-list block
    if (listItems.length && !block.listItem) {
      html += '<ul>' + listItems.join('') + '</ul>';
      listItems = [];
    }
    
    if (block._type === 'image' && block.asset?.url) {
      const src = improveImageUrl(block.asset.url, 900);
      html += `<figure>
        <img src="${src}" alt="${esc(block.alt || 'Image')}" loading="lazy"
          style="width:100%;display:block;margin:1.5rem 0;opacity:0;transition:opacity 0.65s ease;"
          onload="this.style.opacity=1"/>
        ${block.caption ? `<figcaption style="font-size:0.82rem;color:var(--muted);margin-top:0.5rem;font-style:italic;">${esc(block.caption)}</figcaption>` : ''}
      </figure>`;
      return;
    }
    
    if (block._type !== 'block') return;
    
    const text = (block.children || []).map(c => {
      let t = esc(c.text || '');
      if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
      if (c.marks?.includes('em'))     t = `<em>${t}</em>`;
      const linkDef = block.markDefs?.find(d => c.marks?.includes(d._key));
      return linkDef?.href ? `<a href="${esc(linkDef.href)}" target="_blank">${t}</a>` : t;
    }).join('');
    
    // Handle list items
    if (block.listItem) {
      listItems.push(`<li>${text}</li>`);
      return;
    }
    
    const style = block.style || 'normal';
    if (['h2','h3','h4'].includes(style)) html += `<${style}>${text}</${style}>`;
    else if (style === 'blockquote') html += `<blockquote>${text}</blockquote>`;
    else html += `<p>${text}</p>`;
  });
  
  // Flush any remaining list items
  if (listItems.length) {
    html += '<ul>' + listItems.join('') + '</ul>';
  }
  
  return html;
}

function initScrollReveal() {
  const els = document.querySelectorAll(
    '.pr-body p, .pr-body h2, .pr-body h3, .pr-body h4, .pr-body ul, .pr-body blockquote'
  );
  if (!els.length) return;
  let delay = 0;
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.transitionDelay = `${delay}s`;
        delay = Math.min(delay + 0.04, 0.3);
        entry.target.classList.add('revealed');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  els.forEach(el => io.observe(el));
}

function paint(post) {
  document.getElementById('page-title').textContent = `${post.title} — Levene Energies Limited`;
  document.getElementById('page-desc').content = post.excerpt || post.title;

  const imgQ = post.imageUrl ? improveImageUrl(post.imageUrl, 1400) : '';

  document.getElementById('pr-hero-wrap').innerHTML = `
  <section class="pr-hero">
    ${imgQ ? `<img class="pr-hero-bg" alt="${esc(post.title)}"/>` : ''}
    <div class="pr-hero-overlay"></div>
    <div class="pr-hero-content">
      <span class="pr-label"><i class="fas fa-feather-alt"></i> Article</span>
      <h1>${esc(post.title)}</h1>
      <div class="pr-hero-meta">
        ${post.publishedAt ? `<span><i class="fas fa-calendar"></i> ${fmt(post.publishedAt)}</span>` : ''}
      </div>
      <div class="breadcrumb" style="margin-top:2.5rem;">
        <a href="index.html">Home</a><span>/</span>
        <a href="blog.html">Blog</a><span>/</span>
        <span class="current">${esc(post.title)}</span>
      </div>
    </div>
  </section>`;

  if (imgQ) {
    const heroBg = document.querySelector('.pr-hero-bg');
    if (heroBg) {
      const tmp = new Image();
      tmp.onload = () => { heroBg.src = imgQ; heroBg.classList.add('loaded'); };
      tmp.src = imgQ;
    }
  }

  const bodyHtml = post.content?.length
    ? ptToHtml(post.content)
    : post.excerpt ? `<p>${esc(post.excerpt)}</p>`
    : '<p style="font-style:italic;">No content available for this article.</p>';

  const imgSrc = post.imageUrl ? improveImageUrl(post.imageUrl, 900) : '';

  const imgColHtml = imgSrc
    ? `<div class="pr-img-wrap"><img alt="${esc(post.title)}" loading="lazy"/></div>`
    : `<div class="pr-img-wrap"><div class="pr-img-placeholder"><i class="fas fa-image"></i></div></div>`;

  document.getElementById('pr-body-wrap').innerHTML = `
  <div class="pr-outer">
    <a href="media.html#blog" class="back-link"><i class="fas fa-arrow-left"></i> Back to Blog</a>
    <div class="pr-columns">

      ${imgColHtml}

      <div class="pr-panel">
        <p class="pr-panel-label">Latest Article</p>
        <hr class="pr-panel-rule"/>
        <h2 class="pr-panel-title">${esc(post.title)}</h2>
        <div class="pr-meta">
          ${post.publishedAt ? `<span><i class="fas fa-calendar-day"></i> ${fmt(post.publishedAt)}</span>` : ''}
        </div>
        <div class="pr-body">${bodyHtml}</div>
        <div class="pr-actions">
          <a href="media.html#blog" class="btn btn--outline-dark">All Articles</a>
        </div>
      </div>

    </div>
  </div>`;

  if (imgSrc) {
    const colImg = document.querySelector('.pr-img-wrap img');
    if (colImg) {
      const tmp2 = new Image();
      tmp2.onload = () => { colImg.src = imgSrc; colImg.classList.add('loaded'); };
      tmp2.src = imgSrc;
    }
  }

  requestAnimationFrame(initScrollReveal);
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) {
    document.getElementById('pr-hero-wrap').innerHTML = '';
    document.getElementById('pr-body-wrap').innerHTML = `
      <div class="pr-loading">
        <i class="fas fa-exclamation-circle"></i>
        <h2 style="color:var(--navy);margin-bottom:1rem;">No article selected</h2>
        <p>Please choose a post from the <a href="blog.html">blog</a>.</p>
      </div>`;
    return;
  }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="post" && slug.current=="${slug}"][0]{
    title, excerpt, publishedAt,
    "imageUrl": mainImage.asset->url,
    content
  }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();
    if (!data.result) throw new Error('Post not found');
    paint(data.result);
  } catch (err) {
    console.error('Post load error:', err);
    document.getElementById('pr-hero-wrap').innerHTML = '';
    document.getElementById('pr-body-wrap').innerHTML = `
      <div class="pr-loading">
        <i class="fas fa-exclamation-triangle"></i>
        <h2 style="color:var(--navy);margin-bottom:1rem;">Article Not Found</h2>
        <p style="margin-bottom:2rem;">This post may have been removed or is not available.</p>
        <a href="blog.html" class="btn btn--primary">Back to Blog</a>
      </div>`;
  }
})();
</script>
