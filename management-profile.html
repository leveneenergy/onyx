<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Leadership Profile - Levene Energies Limited</title>
  <meta name="description" id="page-desc" content="Leadership profile at Levene Energies Limited."/>
  <meta name="keywords" content="leadership, profile, executive, Levene Energies"/>
  <meta name="author" content="Levene Energies Limited"/>
  <meta name="robots" content="index, follow"/>
  <meta name="language" content="English"/>
  <meta property="og:title" id="og-title" content="Leadership Profile"/>
  <meta property="og:description" id="og-description" content=""/>
  <meta property="og:type" content="profile"/>
  <meta property="og:image" id="og-image" content=""/>
  <meta property="og:url" id="og-url" content=""/>
  <meta property="og:site_name" content="Levene Energies Limited"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" id="twitter-title" content="Leadership Profile"/>
  <meta name="twitter:description" id="twitter-description" content=""/>
  <meta name="twitter:image" id="twitter-image" content=""/>
  <link rel="canonical" id="canonical-url" href=""/>
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">
  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="./css/management.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="sub-page">

<div id="header-placeholder"></div>
<script>
  fetch('header.html')
    .then(r => { if (!r.ok) throw new Error('Header not found'); return r.text(); })
    .then(html => { document.getElementById('header-placeholder').innerHTML = html; initNav(); })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');
    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation(); navList.classList.add('open'); document.body.style.overflow = 'hidden';
      });
    }
    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open'); document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      });
    }
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open'); document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
        }
      }
    });
    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault(); e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open'); document.body.style.overflow = '';
      });
    });
  }
</script>

<div id="profile-root">
  <div class="mgmt-loading-state">
    <i class="fas fa-spinner fa-spin" style="color:var(--navy);opacity:0.4;font-size:2rem;"></i>
    <p>Loading profile…</p>
  </div>
</div>

<div id="footer-placeholder"></div>
<script>
  fetch('footer.html').then(r=>r.text()).then(h=>document.getElementById('footer-placeholder').innerHTML=h).catch(e=>console.error(e));
</script>

<script>
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function ptToHtml(blocks) {
    if (!blocks?.length) return '<p>Biography coming soon.</p>';
    return blocks.map(block => {
      if (block._type !== 'block') return '';
      const text = (block.children || []).map(child => {
        let t = esc(child.text || '');
        if (child.marks?.includes('strong')) t = `<strong>${t}</strong>`;
        if (child.marks?.includes('em'))     t = `<em>${t}</em>`;
        return t;
      }).join('');
      const s = block.style || 'normal';
      if (s === 'h2') return `<h2>${text}</h2>`;
      if (s === 'h3') return `<h3>${text}</h3>`;
      if (s === 'blockquote') return `<blockquote>${text}</blockquote>`;
      return `<p>${text}</p>`;
    }).join('');
  }

  function paint(p) {
    const backHref = p.category === 'board' ? 'board-of-directors.html' : 'executive-directors.html';
    const backLabel = p.category === 'board' ? 'Board of Directors' : 'Executive Directors';

    document.title = `${p.name} - Levene Energies Limited`;
    document.getElementById('page-desc').content = p.role || '';

    const photoUrl = p.photoUrl ? `${p.photoUrl}?w=800&h=960&auto=format&fit=crop&q=82` : null;
    const bioHtml  = Array.isArray(p.fullBio) ? ptToHtml(p.fullBio) : '';

    document.getElementById('profile-root').innerHTML = `

      <!-- HERO -->
      <section class="profile-hero">
        <div class="profile-hero-overlay"></div>
        <div class="profile-hero-content">
          <div class="section-label" style="color:var(--gold);">
            <span style="display:flex;align-items:center;gap:.75rem;">
              <span style="width:32px;height:2px;background:var(--gold);display:block;"></span>
              ${esc(backLabel)}
            </span>
          </div>
          <h1>${esc(p.name)}</h1>
          <p class="profile-hero-role">${esc(p.role)}</p>
          <div class="sub-hero-breadcrumb">
            <a href="index.html">Home</a> /
            <a href="${backHref}">${esc(backLabel)}</a> /
            <span class="current">${esc(p.name)}</span>
          </div>
        </div>
      </section>

      <!-- MAIN BODY -->
      <div class="profile-body">
        <div class="profile-grid">

          <!-- LEFT: photo + back actions -->
          <div class="profile-left">
            <div class="profile-photo-wrap">
              ${photoUrl
                ? `<img src="${photoUrl}" alt="${esc(p.name)}" class="profile-photo"/>`
                : `<div class="profile-photo-placeholder"><i class="fas fa-user"></i></div>`
              }
              <!-- gold accent bar -->
              <div class="profile-photo-bar"></div>
            </div>

            <div class="profile-actions">
              <a href="${backHref}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to ${esc(backLabel)}
              </a>
              ${p.linkedin ? `
              <a href="${p.linkedin}" target="_blank" rel="noopener noreferrer" class="btn btn--outline website-btn">
                <i class="fab fa-linkedin"></i> LinkedIn
              </a>` : ''}
            </div>

            <!-- Category badge -->
            <div class="profile-badge">${esc(backLabel)}</div>
          </div>

          <!-- RIGHT: bio text -->
          <div class="profile-right">
            <div class="profile-name-block">
              <h2>${esc(p.name)}</h2>
              <div class="profile-role-line">${esc(p.role)}</div>
              <div class="profile-divider"></div>
            </div>
            <div class="rich-text profile-bio">
              ${bioHtml || '<p>Detailed biography coming soon.</p>'}
            </div>
          </div>

        </div>

        <!-- PULLQUOTE -->
        <div class="sub-pullquote">
          <blockquote>"Leadership is not about being in charge. It is about taking care of those in your charge — and the communities we serve."</blockquote>
        </div>
      </div>
    `;

    const io = new IntersectionObserver(es => {
      es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.profile-left, .profile-right').forEach(el => io.observe(el));
  }

  function showError() {
    document.getElementById('profile-root').innerHTML = `
      <div class="mgmt-loading-state">
        <i class="fas fa-exclamation-circle" style="color:var(--navy);opacity:0.3;font-size:3rem;"></i>
        <h2 style="font-family:var(--font-display);color:var(--navy);margin:1rem 0;">Profile Not Available</h2>
        <p>This profile hasn't been added yet.</p>
        <a href="board-of-directors.html" class="btn btn--primary" style="margin-top:2rem;">View Board of Directors</a>
      </div>`;
  }

  (async () => {
    const slug = new URLSearchParams(location.search).get('slug')?.trim();
    if (!slug) { location.href = 'board-of-directors.html'; return; }

    const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
    const q = `*[_type=="managementProfile" && slug.current=="${slug}"][0]{
      name, role, category, excerpt, fullBio, linkedin,
      "slug": slug.current,
      "photoUrl": photo.asset->url
    }`;

    try {
      const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}&_=${Date.now()}`);
      if (!res.ok) throw new Error('Fetch failed');
      const { result } = await res.json();
      if (result) paint(result);
      else showError();
    } catch(err) {
      console.error(err);
      showError();
    }
  })();
</script>

</body>
</html>
