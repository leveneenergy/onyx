<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Subsidiary - Levene Energies Limited</title>
  <meta name="description" id="page-desc" content="Learn more about this Levene Energies Limited subsidiary." />
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/subsidiary.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Corner-bracket image wrapper ── */
    .img-bracket-wrap {
      position: relative;
      display: block;
      width: 100%;
      padding: 10px; /* room for brackets to overflow */
    }

    .img-bracket-wrap img,
    .img-bracket-wrap .img-placeholder {
      display: block;
      width: 100%;
      border-radius: 4px;
    }

    /* top-left gold bracket */
    .img-bracket-wrap::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 38px;
      height: 38px;
      border-top: 3px solid #c9a227;
      border-left: 3px solid #c9a227;
      border-radius: 2px 0 0 0;
      pointer-events: none;
    }

    /* bottom-right navy bracket */
    .img-bracket-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 38px;
      height: 38px;
      border-bottom: 3px solid #174caa;
      border-right: 3px solid #174caa;
      border-radius: 0 0 2px 0;
      pointer-events: none;
    }

    /* ── Back / Website button row ── */
    .sub-back-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.8rem;
      flex-wrap: wrap;
    }

    .website-btn {
      font-size: 0.82rem;
      padding: 0.5rem 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <script>
    fetch('header.html')
      .then(r => {
        if (!r.ok) throw new Error('Header file not found');
        return r.text();
      })
      .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        initNav();
      })
      .catch(err => console.error('Failed to load header:', err));

    function initNav() {
      const hamburger = document.getElementById('hamburger');
      const navList   = document.getElementById('nav-list');
      const navClose  = document.getElementById('nav-close');

      if (hamburger && navList) {
        hamburger.addEventListener('click', function(e) {
          e.stopPropagation();
          navList.classList.add('open');
          document.body.style.overflow = 'hidden';
        });
      }
      if (navClose) {
        navClose.addEventListener('click', function() {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
        });
      }
      document.addEventListener('click', function(e) {
        if (navList && navList.classList.contains('open')) {
          if (!navList.contains(e.target) && e.target !== hamburger) {
            navList.classList.remove('open');
            document.body.style.overflow = '';
            document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
          }
        }
      });
      document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
        link.addEventListener('click', function(e) {
          if (window.innerWidth > 768) return;
          e.preventDefault(); e.stopPropagation();
          var dropdown = link.closest('.dropdown');
          var isOpen = dropdown.classList.contains('mob-open');
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) { d.classList.remove('mob-open'); });
          if (!isOpen) dropdown.classList.add('mob-open');
        });
      });
      document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
        link.addEventListener('click', function() {
          if (window.innerWidth > 768) return;
          navList.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
    }
  </script>

  <div id="sub-page-root">
    <div class="sub-loading-state">
      <i class="fas fa-spinner fa-spin" style="color: var(--navy); opacity: 0.4"></i>
      <p>Loading subsidiary details…</p>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script>
    fetch("footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer-placeholder").innerHTML = html)
      .catch(err => console.error("Footer load failed:", err));
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hb = document.getElementById("hamburger");
      const nl = document.getElementById("nav-list");
      const nc = document.getElementById("nav-close");
      if (hb && nl) hb.addEventListener("click", e => { e.stopPropagation(); nl.classList.add("open"); });
      if (nc) nc.addEventListener("click", () => {
        nl.classList.remove("open");
        document.querySelectorAll(".nav-list .dropdown").forEach(d => d.classList.remove("mob-open"));
      });
    });
  </script>

  <script>
    const esc = s => String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

    function ptToHtml(blocks) {
      if (!blocks?.length) return "<p>Detailed content coming soon.</p>";
      return blocks.map(block => {
        if (block._type !== "block") return "";
        const text = (block.children || []).map(child => {
          let t = esc(child.text || "");
          if (child.marks?.includes("strong")) t = `<strong>${t}</strong>`;
          if (child.marks?.includes("em")) t = `<em>${t}</em>`;
          return t;
        }).join("");
        const s = block.style || "normal";
        if (s === "h2") return `<h2>${text}</h2>`;
        if (s === "h3") return `<h3>${text}</h3>`;
        if (s === "blockquote") return `<blockquote>${text}</blockquote>`;
        return `<p>${text}</p>`;
      }).join("");
    }

    function imgOrPlaceholder(url, alt) {
      const inner = url
        ? `<img src="${esc(url)}" alt="${esc(alt)}" loading="lazy" />`
        : `<div class="img-placeholder"><i class="fas fa-image"></i></div>`;
      return `<div class="img-bracket-wrap">${inner}</div>`;
    }

    function paint(sub) {
      document.title = `${sub.name} - Levene Energies Limited`;
      document.getElementById("page-desc").content = sub.tagline || sub.sector || "";

      const heroImg = sub.coverImageUrl ? `${sub.coverImageUrl}?w=1800&auto=format&q=82` : "";
      const mainImg = sub.mainImageUrl  ? `${sub.mainImageUrl}?w=950&auto=format&fit=crop&q=80` : "";
      const fullHtml = Array.isArray(sub.fullContent) ? ptToHtml(sub.fullContent) : "";
      const isTrading = sub.slug === "levene-trading";

      document.getElementById("sub-page-root").innerHTML = `
        <section class="sub-hero">
          ${heroImg ? `<img class="sub-hero-bg" src="${heroImg}" alt="${esc(sub.name)}" />` : ""}
          <div class="sub-hero-overlay"></div>
          <div class="sub-hero-content">
            <div class="sub-hero-sector">${esc(sub.sector || "Levene Energies")}</div>
            <h1>${esc(sub.name)}</h1>
            ${sub.tagline ? `<p class="sub-hero-tagline">${esc(sub.tagline)}</p>` : ""}
            <div class="sub-hero-actions">
              <a href="contact.html" class="btn btn--green">Make an Enquiry <i class="fas fa-arrow-right"></i></a>
              <a href="subsidiaries.html" class="btn btn--outline">All Subsidiaries</a>
            </div>
            <div class="sub-hero-breadcrumb">
              <a href="index.html">Home</a> / 
              <a href="subsidiaries.html">Subsidiaries</a> / 
              <span class="current">${esc(sub.name)}</span>
            </div>
          </div>
        </section>

        <div class="sub-body-wrap">
          <div class="sub-main-content">
            <div class="sub-main-grid">
              <div class="sub-main-image">
                ${imgOrPlaceholder(mainImg, sub.name)}
                <div class="sub-back-actions">
                  <a href="subsidiaries.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to All Subsidiaries
                  </a>
                  ${sub.website ? `
                  <a href="${esc(sub.website)}" target="_blank" rel="noopener noreferrer" class="btn btn--outline website-btn">
                    <i class="fas fa-globe"></i> Visit Website
                  </a>` : ""}
                </div>
              </div>
              <div class="sub-main-text">
                <div class="rich-text">
                  ${fullHtml || "<p>Detailed information about this subsidiary is coming soon.</p>"}
                </div>
              </div>
            </div>
          </div>

          ${isTrading ? tradingStatBand() : ""}

          <div class="sub-pullquote">
            <blockquote>"Delivering energy solutions that <strong>power communities</strong>, drive economies, and shape a more sustainable future - one operation at a time."</blockquote>
          </div>
        </div>
      `;

      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add("visible"); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll(".sub-main-image, .sub-main-text, .sub-split-img, .sub-split-text").forEach(el => io.observe(el));
    }

    function showError() {
      document.getElementById("sub-page-root").innerHTML = `
        <div class="sub-loading-state">
          <i class="fas fa-exclamation-circle" style="color:var(--navy); opacity:0.3; font-size:3rem;"></i>
          <h2 style="font-family:var(--font-display); color:var(--navy); margin:1rem 0;">Content Not Available</h2>
          <p>This subsidiary's content hasn't been added yet.</p>
          <a href="subsidiaries.html" class="btn btn--primary" style="margin-top:2rem;">View All Subsidiaries</a>
        </div>`;
    }

    (async () => {
      const slug = new URLSearchParams(location.search).get("slug")?.trim();
      if (!slug) { location.href = "subsidiaries.html"; return; }

      const BASE = "https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production";
      const q = `*[_type=="subsidiary" && slug.current=="${slug}"][0]{
        name, tagline, sector, excerpt, fullContent, website,
        "slug": slug.current,
        "coverImageUrl": coverImage.asset->url,
        "mainImageUrl": mainImage.asset->url
      }`;

      try {
        const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
        if (!res.ok) throw new Error("Fetch failed");
        const { result } = await res.json();
        if (result) paint(result);
        else showError();
      } catch (err) {
        console.error(err);
        showError();
      }
    })();
  </script>
