<head>

  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    .sub-hero {
      position: relative;
      min-height: 500px;
      display: flex;
      align-items: flex-end;
      background: var(--navy);
      overflow: hidden;
    }
    .sub-hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sub-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, #174caa 0%, rgba(4,24,68,.5) 100%);
    }
    .sub-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 5% 5rem;
      max-width: 860px;
    }
    .sub-hero-sector {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    .sub-hero-sector::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
    }
    .sub-hero-content h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem,5vw,4rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.1;

    }
    .sub-hero-content p {
      font-size: 1.05rem;
      color: rgba(255,255,255,.78);
      max-width: 560px;
      line-height: 1.7;
    }
    .sub-hero-breadcrumb {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: 2rem;
      font-size: .78rem;
    }
    .sub-hero-breadcrumb a { color: rgba(255,255,255,.45); }
    .sub-hero-breadcrumb a:hover { color: var(--white); }
    .sub-hero-breadcrumb span { color: rgba(255,255,255,.25); }
    .sub-hero-breadcrumb .current { color: rgba(255,255,255,.65); }

    .sub-body {
      max-width: 880px;
      margin: 0 auto;
      padding: 5rem 5% 7rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 3rem;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--navy); }

    .rich-text p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 1.02rem;
      margin-bottom: 1.4rem;
    }
    .rich-text h2, .rich-text h3 {
      font-family: var(--font-display);
      color: var(--navy);
      margin: 2rem 0 .75rem;
    }
    .rich-text ul {
      list-style: disc;
      padding-left: 1.5rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .rich-text ul li {
      margin-bottom: .4rem;
      line-height: 1.75;
    }

    .sub-actions {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="header-placeholder"></div>

<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header not found');
      return r.text();
    })
    .then(html => document.getElementById('header-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load header:', err));
</script>

<!-- Hero & Breadcrumb -->
<div id="sub-hero-wrap"></div>

<!-- Main Content -->
<div id="sub-body-wrap">
  <div class="sub-body">
    <div style="text-align:center;padding:6rem 1rem;color:var(--muted);">
      <i class="fas fa-spinner fa-spin" style="font-size:2.5rem;margin-bottom:1rem;"></i>
      <p>Loading subsidiary details...</p>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<!-- Mobile Nav -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navList   = document.getElementById('nav-list');
  const navClose  = document.getElementById('nav-close');

  if (hamburger && navList) {
    hamburger.addEventListener('click', e => {
      e.stopPropagation();
      navList.classList.add('open');
    });
  }

  if (navClose) {
    navClose.addEventListener('click', () => {
      navList.classList.remove('open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
    });
  }

  document.querySelectorAll('.nav-list .dropdown > a').forEach(link => {
    link.addEventListener('click', e => {
      if (window.innerWidth > 768) return;
      e.preventDefault();
      e.stopPropagation();
      const dropdown = link.closest('.dropdown');
      const isOpen = dropdown.classList.contains('mob-open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      if (!isOpen) dropdown.classList.add('mob-open');
    });
  });
});
</script>

<!-- Subsidiary Detail Logic -->
<script>
// ── Helpers ──
const esc = s => String(s || '')
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;');

// Portable Text → HTML converter
function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>No content available.</p>';
  return blocks.map(block => {
    if (block._type !== 'block') return '';
    const text = (block.children || []).map(child => {
      let t = esc(child.text || '');
      if (child.marks?.includes('strong')) t = `<strong>${t}</strong>`;
      if (child.marks?.includes('em')) t = `<em>${t}</em>`;
      return t;
    }).join('');
    const style = block.style || 'normal';
    if (['h2','h3','h4'].includes(style)) return `<${style}>${text}</${style}>`;
    if (style === 'blockquote') return `<blockquote>${text}</blockquote>`;
    return `<p>${text}</p>`;
  }).join('');
}

// Static fallback data (used if Sanity query fails or item not found)
const STATIC = {
  "levene-hydrocarbon": {
    name: "Levene Hydrocarbon Limited",
    sector: "Upstream · Midstream",
    tagline: "Exploration, Production & Development",
    description: "<p>Engaged in the exploration, production and development of crude oil and natural gas assets across Nigeria's prolific basins.</p>",
    imgUrl: "./image/16.-Levene-Hydrocarbon-Webpage-Image.jpg"
  },
  "levene-energy-development": {
    name: "Levene Energy Development",
    sector: "Renewables · Clean Energy",
    tagline: "Powering Africa's Future Sustainably",
    description: "<p>Pioneering solar energy deployment — locally assembled panels, mini-grid infrastructure and off-grid electrification solutions across Nigeria.</p>",
    imgUrl: "./image/Solar-Mini-Grid-Project.jpg"
  },
  "levene-trading": {
    name: "Levene Trading",
    sector: "Global Trading",
    tagline: "Connecting Global Energy Markets",
    description: "<p>International commodity trading of crude oil, refined petroleum products and LNG — connecting suppliers and buyers across global energy markets.</p>",
    imgUrl:' ./image/16.-Levene-Hydrocarbon-Webpage-Image.jpg'
  },
   "gas-and-power": {
    name: "Gas & Power",
    sector: "Gas · Power · Infrastructure",
    tagline: "Building Scalable Energy Infrastructure Across West Africa",
    description: "<p>Levene Gas &amp; Power is a diversified energy infrastructure platform that builds, owns and invests in scalable gas, power and renewable assets — while delivering strategic procurement and advisory solutions across Nigeria and West Africa.</p><p>We operate at the intersection of gas commercialisation and power generation, bridging the critical gap between Nigeria's abundant hydrocarbon resources and its significant electricity deficit. Our integrated approach enables us to develop projects from concept to commissioning, offering a full-cycle solution for energy infrastructure development.</p><h2>What We Do</h2><ul><li><strong>Gas Infrastructure Development</strong> — Aggregation, processing and distribution of natural gas through pipelines, virtual pipeline systems and CNG/LNG logistics networks.</li><li><strong>Power Generation</strong> — Development and operation of gas-to-power plants, including captive power solutions for industrial and commercial clients.</li><li><strong>Mini-Grid &amp; Distributed Energy</strong> — Off-grid and hybrid power systems combining gas and renewables to extend reliable electricity to underserved communities and industrial clusters.</li><li><strong>Energy Procurement &amp; Advisory</strong> — Strategic sourcing, procurement management and commercial advisory for energy projects across the value chain.</li><li><strong>Infrastructure Investment</strong> — Co-investment and project finance structuring for scalable energy assets with long-term offtake agreements.</li></ul><h2>Our Focus</h2><p>With Nigeria's electricity supply gap estimated at over 180,000 MW of unmet demand, Levene Gas &amp; Power is positioned to deliver reliable, affordable and sustainable energy solutions. We partner with governments, development finance institutions, industrial operators and private investors to unlock the commercial potential of West Africa's energy transition.</p>",
    imgUrl: "./image/16.-Levene-Hydrocarbon-Webpage-Image.jpg"
  }
};

function paint(sub, slug) {
  document.title = `${sub.name} — Levene Energies Limited`;
  document.getElementById('page-desc').content = sub.tagline || sub.sector || '';

  const imgQ = sub.imgUrl ? `${sub.imgUrl}?w=1400&auto=format&q=80` : '';

  document.getElementById('sub-hero-wrap').innerHTML = `
  <section class="sub-hero">
    ${imgQ ? `<img class="sub-hero-bg" src="${imgQ}" alt="${esc(sub.name)}"/>` : ''}
    <div class="sub-hero-overlay"></div>
    <div class="sub-hero-content">
      <div class="sub-hero-sector">${esc(sub.sector || '')}</div>
      <h1>${esc(sub.name)}</h1>
      ${sub.tagline ? `<p>${esc(sub.tagline)}</p>` : ''}
      <div class="sub-hero-breadcrumb">
        <a href="index.html">Home</a><span>/</span>
        <a href="subsidiaries.html">Subsidiaries</a><span>/</span>
        <span class="current">${esc(sub.name)}</span>
      </div>
    </div>
  </section>`;

  // Convert Portable Text array to HTML, or fall back to plain string (static data)
  const bodyHtml = Array.isArray(sub.description)
    ? ptToHtml(sub.description)
    : sub.description || '<p>Content coming soon.</p>';

  document.getElementById('sub-body-wrap').innerHTML = `
  <div class="sub-body">
    <a href="subsidiaries.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to All Subsidiaries</a>
    <div class="rich-text">${bodyHtml}</div>
    <div class="sub-actions">
      <a href="contact.html" class="btn btn--primary">Make an Enquiry <i class="fas fa-arrow-right"></i></a>
      <a href="subsidiaries.html" class="btn btn--outline-dark">View All Subsidiaries</a>
    </div>
  </div>`;
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) {
    location.href = 'subsidiaries.html';
    return;
  }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="subsidiary" && slug.current=="${slug}"][0]{
    name,
    tagline,
    sector,
    "imgUrl": coverImage.asset->url,
    description,
    website
  }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();

    if (data.result) {
      paint(data.result, slug);
      return;
    }
  } catch (err) {
    console.error('Sanity error:', err);
  }

  // Fallback to static data
  const fb = STATIC[slug];
  if (fb) {
    paint(fb, slug);
  } else {
    document.getElementById('sub-hero-wrap').innerHTML = '';
    document.getElementById('sub-body-wrap').innerHTML = `
      <div style="text-align:center;padding:8rem 5%;color:var(--muted);">
        <i class="fas fa-exclamation-circle" style="font-size:4rem;margin-bottom:1.5rem;"></i>
        <h2>Subsidiary Not Found</h2>
        <p style="margin:1.5rem 0;">The requested subsidiary could not be found.</p>
        <a href="subsidiaries.html" class="btn btn--primary">View All Subsidiaries</a>
      </div>`;
  }
})();
</script>

</body>
</html>
