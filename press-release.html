<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Press Release — Levene Energies Limited</title>
  <meta id="page-desc" name="description" content="Press release — Levene Energies Limited." />
  <meta name="keywords" content="press release, news, Levene Energies"/>
  <meta name="author" content="Levene Energies Limited"/>
  <meta name="robots" content="index, follow"/>
  <meta name="language" content="English"/>
  <meta property="og:type" id="og-type" content="article"/>
  <meta property="og:title" id="og-title" content="Press Release"/>
  <meta property="og:description" id="og-description" content=""/>
  <meta property="og:image" id="og-image" content=""/>
  <meta property="og:url" id="og-url" content=""/>
  <meta property="og:site_name" content="Levene Energies Limited"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" id="twitter-title" content="Press Release"/>
  <meta name="twitter:description" id="twitter-description" content=""/>
  <meta name="twitter:image" id="twitter-image" content=""/>
  <link rel="canonical" id="canonical-url" href=""/>
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/press-release.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="press-page">

<div id="header-placeholder"></div>
<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav(); 
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');

    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navList.classList.add('open');
        document.body.style.overflow = 'hidden'; 
      });
    }

    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open');
        document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
      });
    }

   
    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
            d.classList.remove('mob-open');
          });
        }
      }
    });


    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen   = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });

    
    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }
</script>


<!-- Dynamic Content -->
<div id="pr-wrap">
  <div class="pr-loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading press release…</p>
  </div>
</div>

<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>


<!-- Press Release Renderer -->
<script>
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(d) {
  return d ? new Date(d).toLocaleDateString('en-GB', {year:'numeric', month:'long', day:'numeric'}) : '';
}
function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>No content available.</p>';
  return blocks.map(block => {
    if (block._type !== 'block') return '';
    const text = (block.children || []).map(child => {
      let t = esc(child.text || '');
      if (child.marks?.includes('strong')) t = `<strong>${t}</strong>`;
      if (child.marks?.includes('em')) t = `<em>${t}</em>`;
      return t;
    }).join('');
    const style = block.style || 'normal';
    if (style === 'h2') return `<h2>${text}</h2>`;
    if (style === 'h3') return `<h3>${text}</h3>`;
    if (style === 'h4') return `<h4>${text}</h4>`;
    if (style === 'blockquote') return `<blockquote>${text}</blockquote>`;
    return `<p>${text}</p>`;
  }).join('');
}

/* ── Scroll-reveal ── */
function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document
    .querySelectorAll('.pr-body p, .pr-body h2, .pr-body h3, .pr-body h4, .pr-body ul, .pr-body blockquote')
    .forEach(el => observer.observe(el));
}

function paint(pr) {
  document.title = `${pr.title} — Levene Energies Limited`;
  document.getElementById('page-desc').content = pr.excerpt || pr.title;

  const imgUrl = pr.imgUrl ? `${pr.imgUrl}?w=900&auto=format&fit=crop&q=85` : '';
  const bodyHtml = pr.description ? ptToHtml(pr.description) :
                   pr.excerpt ? `<p>${esc(pr.excerpt)}</p>` : '<p>Content coming soon.</p>';

  document.getElementById('pr-wrap').innerHTML = `
    <section class="page-hero">
      <div class="page-hero-inner">
        <div class="section-label">Media Centre</div>
        <h1>PRESS RELEASE</h1>
        <p>${esc(pr.excerpt || pr.title)}</p>
        <div class="breadcrumb">
          <a href="./index.html">Home</a><span>/</span>
          <a href="./media.html#press">Press Releases</a><span>/</span>
          <span>${esc(pr.title)}</span>
        </div>
      </div>
    </section>

    <div class="pr-outer">
      <a href="./media.html#press" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Press Releases
      </a>

      <div class="pr-columns">
        <!-- Image -->
        <div class="pr-img-wrap">
          ${imgUrl
            ? `<img src="${imgUrl}" alt="${esc(pr.title)}" />`
            : `<div class="pr-img-placeholder"><i class="fas fa-newspaper"></i></div>`}
        </div>

        <!-- Content -->
        <div class="pr-panel">
          <p class="pr-panel-label"></p>
          <hr class="pr-panel-rule" />
          <p class="pr-panel-title">${esc(pr.title)}</p>

          <div class="pr-meta">
            ${pr.publishedAt ? `<span><i class="fas fa-calendar-alt"></i> ${fmt(pr.publishedAt)}</span>` : ''}
            ${pr.source ? `<span><i class="fas fa-building"></i> ${esc(pr.source)}</span>` : ''}
          </div>

          <div class="pr-body">${bodyHtml}</div>

          <div class="pr-actions">
            ${pr.externalUrl ? `<a href="${esc(pr.externalUrl)}" target="_blank" class="btn btn--green">View Original</a>` : ''}
            ${pr.fileUrl ? `<a href="${esc(pr.fileUrl)}" target="_blank" class="btn btn--outline-dark">Download PDF</a>` : ''}
            <a href="./media.html#press" class="btn btn--outline-dark">All Press Releases</a>
          </div>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(() => initScrollReveal());
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) {
    location.href = './media.html#press';
    return;
  }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="pressRelease" && (slug.current=="${slug}" || _id=="${slug}")][0]{
    title, excerpt, publishedAt, source, externalUrl, description,
    "imgUrl": coverImage.asset->url,
    "fileUrl": file.asset->url
  }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Fetch failed');
    const data = await res.json();
    if (data.result) {
      paint(data.result);
    } else {
      showError();
    }
  } catch (err) {
    console.error(err);
    showError();
  }
})();

function showError() {
  document.getElementById('pr-wrap').innerHTML = `
    <div class="pr-loading">
      <i class="fas fa-exclamation-circle"></i>
      <h2 style="margin:1.5rem 0 0.5rem; color:var(--navy);">Not Found</h2>
      <p>This press release could not be found.</p>
      <a href="./media.html#press" class="btn btn--primary" style="margin-top:2rem;">View All Press Releases</a>
    </div>`;
}
</script>
</body>
</html>
