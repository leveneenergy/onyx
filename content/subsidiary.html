<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Subsidiary — Levene Energies Limited</title>
  <meta id="page-desc" name="description" content="Subsidiary profile — Levene Energies Limited."/>
  <meta name="keywords" content="subsidiary, company, portfolio, Levene Energies"/>
  <meta name="author" content="Levene Energies Limited"/>
  <meta name="robots" content="index, follow"/>
  <meta name="language" content="English"/>
  <meta property="og:title" id="og-title" content="Subsidiary"/>
  <meta property="og:description" id="og-description" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" id="og-image" content=""/>
  <meta property="og:url" id="og-url" content=""/>
  <meta property="og:site_name" content="Levene Energies Limited"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" id="twitter-title" content="Subsidiary"/>
  <meta name="twitter:description" id="twitter-description" content=""/>
  <meta name="twitter:image" id="twitter-image" content=""/>
  <link rel="canonical" id="canonical-url" href=""/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="shortcut icon" href="../image/levene-energies.png" type="image/x-icon">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/subsidiary.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="header-placeholder"></div>

<script>
  fetch('../header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header file not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      initNav(); 
    })
    .catch(err => console.error('Failed to load header:', err));

  function initNav() {
    const hamburger = document.getElementById('hamburger');
    const navList   = document.getElementById('nav-list');
    const navClose  = document.getElementById('nav-close');

    if (hamburger && navList) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navList.classList.add('open');
        document.body.style.overflow = 'hidden'; 
      });
    }

    if (navClose) {
      navClose.addEventListener('click', function() {
        navList.classList.remove('open');
        document.body.style.overflow = '';
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
      });
    }

    document.addEventListener('click', function(e) {
      if (navList && navList.classList.contains('open')) {
        if (!navList.contains(e.target) && e.target !== hamburger) {
          navList.classList.remove('open');
          document.body.style.overflow = '';
          document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
            d.classList.remove('mob-open');
          });
        }
      }
    });

    document.querySelectorAll('.nav-list .dropdown > a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth > 768) return;
        e.preventDefault();
        e.stopPropagation();
        var dropdown = link.closest('.dropdown');
        var isOpen   = dropdown.classList.contains('mob-open');
        document.querySelectorAll('.nav-list .dropdown').forEach(function(d) {
          d.classList.remove('mob-open');
        });
        if (!isOpen) dropdown.classList.add('mob-open');
      });
    });

    document.querySelectorAll('.nav-list > li:not(.dropdown) > a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth > 768) return;
        navList.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  }
</script>

<div id="sub-page-root">
  <div class="sub-loading-state">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading subsidiary...</p>
  </div>
</div>

<section class="cta-band">
  <h2>Ready to partner with us?</h2>
  <p>Connect with our team to explore opportunities and collaborations.</p>
  <a href="../contact.html" class="btn btn--green">Contact Us <i class="fas fa-arrow-right"></i></a>
  <a href="../subsidiaries.html" class="btn btn--outline">All Subsidiaries</a>
</section>

<div id="footer-placeholder"></div>

<script>
  fetch('../footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<script>
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function ptToHtml(blocks) {
  if (!blocks?.length) return '<p>Detailed information coming soon.</p>';
  return blocks
    .map(b => {
      if (b._type !== 'block') return '';
      const text = (b.children || [])
        .map(c => {
          let t = esc(c.text || '');
          if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
          if (c.marks?.includes('em')) t = `<em>${t}</em>`;
          const link = b.markDefs?.find(d => c.marks?.includes(d._key));
          return link?.href ? `<a href="${esc(link.href)}" target="_blank" rel="noopener">${t}</a>` : t;
        })
        .join('');
      const s = b.style || 'normal';
      if (['h2','h3','h4'].includes(s)) return `<${s}>${text}</${s}>`;
      if (s === 'blockquote') return `<blockquote>${text}</blockquote>`;
      return `<p>${text}</p>`;
    })
    .join('');
}

function imgOrPlaceholder(url, alt) {
  return url 
    ? `<img src="${url}" alt="${esc(alt)}" />` 
    : `<div style="background: var(--neutral-2); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px;"><i class="fas fa-building" style="font-size: 4rem; color: var(--navy); opacity: 0.3;"></i></div>`;
}

function paint(sub) {
  const pageTitle = `${sub.name} - Levene Energies Limited`;
  const baseUrl = window.location.origin + '/content/subsidiary.html';
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  const subUrl = slug ? `${baseUrl}?slug=${encodeURIComponent(slug)}` : baseUrl;

  document.title = pageTitle;
  document.getElementById('page-desc').content = sub.tagline || sub.sector || '';
  document.getElementById('og-title').content = pageTitle;
  document.getElementById('og-description').content = sub.tagline || sub.sector || '';
  document.getElementById('og-url').content = subUrl;
  if (sub.coverImageUrl) { document.getElementById('og-image').content = `${sub.coverImageUrl}?w=1200&auto=format&q=85`; }
  document.getElementById('twitter-title').content = pageTitle;
  document.getElementById('twitter-description').content = sub.tagline || sub.sector || '';
  if (sub.coverImageUrl) { document.getElementById('twitter-image').content = `${sub.coverImageUrl}?w=1200&auto=format&q=85`; }
  document.getElementById('canonical-url').href = subUrl;

  const heroImg = sub.coverImageUrl ? `${sub.coverImageUrl}?w=1800&auto=format&q=82` : '';
  const mainImg = sub.mainImageUrl  ? `${sub.mainImageUrl}?w=950&auto=format&fit=crop&q=80` : '';
  const fullHtml = Array.isArray(sub.fullContent) ? ptToHtml(sub.fullContent) : '';

  document.getElementById('sub-page-root').innerHTML = `
    <section class="sub-hero">
      ${heroImg ? `<img class="sub-hero-bg" src="${heroImg}" alt="${esc(sub.name)}" />` : ''}
      <div class="sub-hero-overlay"></div>
      <div class="sub-hero-content">
        <div class="sub-hero-sector">${esc(sub.sector || 'Levene Energies')}</div>
        <h1>${esc(sub.name)}</h1>
        ${sub.tagline ? `<p class="sub-hero-tagline">${esc(sub.tagline)}</p>` : ''}
        <div class="sub-hero-actions">
          <a href="../contact.html" class="btn btn--green">Make an Enquiry <i class="fas fa-arrow-right"></i></a>
          <a href="../subsidiaries.html" class="btn btn--outline">All Subsidiaries</a>
        </div>
        <div class="sub-hero-breadcrumb">
          <a href="../index.html">Home</a> /
          <a href="../subsidiaries.html">Subsidiaries</a> /
          <span class="current">${esc(sub.name)}</span>
        </div>
      </div>
    </section>

    <div class="sub-body-wrap">
      <div class="sub-main-content">
        <div class="sub-main-grid">
          <div class="sub-main-image">
            ${imgOrPlaceholder(mainImg, sub.name)}
            <div class="sub-back-actions">
              <a href="../subsidiaries.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to All Subsidiaries
              </a>
              ${sub.website ? `<a href="${esc(sub.website)}" target="_blank" rel="noopener noreferrer" class="back-link"><i class="fas fa-globe"></i> Visit Website</a>` : ''}
            </div>
          </div>
          <div class="sub-main-text">
            <div class="rich-text">
              ${fullHtml || '<p>Detailed information about this subsidiary is coming soon.</p>'}
            </div>
          </div>
        </div>
      </div>

      <div class="sub-pullquote">
        <blockquote>"Delivering energy solutions that <strong>power communities</strong>, drive economies, and shape a more sustainable future - one operation at a time."</blockquote>
      </div>
    </div>
  `;
}

(async () => {
  const slug = new URLSearchParams(location.search).get('slug')?.trim();
  if (!slug) { location.href = '../subsidiaries.html'; return; }

  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="subsidiary" && slug.current=="${slug}"][0]{ name, tagline, sector, excerpt, fullContent, website, "slug": slug.current, "coverImageUrl": coverImage.asset->url, "mainImageUrl": mainImage.asset->url }`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Fetch failed');
    const { result } = await res.json();
    if (result) paint(result);
    else showError();
  } catch (err) {
    console.error(err);
    showError();
  }
})();

function showError() {
  document.getElementById('sub-page-root').innerHTML = `
    <div class="sub-loading-state">
      <i class="fas fa-exclamation-circle" style="color:var(--navy); opacity:0.3; font-size:3rem;"></i>
      <h2 style="font-family:var(--font-display); color:var(--navy); margin:1rem 0;">Content Not Available</h2>
      <p>This subsidiary's content hasn't been added yet.</p>
      <a href="../subsidiaries.html" class="btn btn--primary" style="margin-top:2rem;">View All Subsidiaries</a>
    </div>`;
}
</script>
</body>
</html>
