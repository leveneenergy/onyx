<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Subsidiaries — Levene Energies Limited Limited</title>
  <meta name="description" content="Explore Levene Energies Limited' diversified portfolio of energy subsidiaries spanning upstream, downstream, trading and renewables."/>
  <meta property="og:title" content="Our Subsidiaries — Levene Energies Limited"/>
  <meta property="og:description" content="Discover our companies across the full energy value chain — from exploration to renewables."/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="./image/levenelogo.png"/>
  <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon">

  <link rel="stylesheet" href="./css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- Header -->
<div id="header-placeholder"></div>

<script>
  fetch('header.html')
    .then(r => {
      if (!r.ok) throw new Error('Header not found');
      return r.text();
    })
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
    })
    .catch(err => console.error('Failed to load header:', err));
</script>

<!-- Page Hero -->
<section class="page-hero">
  <div class="page-hero-inner">
    <div class="section-label">Our Business</div>
    <h1>SUBSIDIARIES</h1>
    <p>Diversified portfolio across upstream, midstream, downstream, trading and renewables</p>
    <div class="breadcrumb">
      <a href="index.html">Home</a><span>/</span><span>Subsidiaries</span>
    </div>
  </div>
</section>

<!-- Subsidiaries Grid -->
<section class="subs-section">
  <div class="subs-wrap">
    <div class="subs-grid" id="subs-grid">
      <div style="grid-column: span 3; text-align: center; padding: 6rem 1rem; color: var(--muted);">
        <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
        <p>Loading our subsidiaries...</p>
      </div>
    </div>
  </div>
</section>

<!-- CTA Band -->
<section class="cta-band">
  <h2>Interested in partnering with one of our subsidiaries?</h2>
  <p>Reach out to discuss opportunities, collaborations or investment.</p>
  <a href="contact.html" class="btn btn--green">Get in Touch</a>
</section>
<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html)
    .catch(err => console.error('Failed to load footer:', err));
</script>

<!-- Scripts -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Mobile nav (only once)
  const hamburger = document.getElementById('hamburger');
  const navList   = document.getElementById('nav-list');
  const navClose  = document.getElementById('nav-close');

  if (hamburger && navList) {
    hamburger.addEventListener('click', e => {
      e.stopPropagation();
      navList.classList.add('open');
    });
  }

  if (navClose) {
    navClose.addEventListener('click', () => {
      navList.classList.remove('open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
    });
  }

  document.querySelectorAll('.nav-list .dropdown > a').forEach(link => {
    link.addEventListener('click', e => {
      if (window.innerWidth > 768) return;
      e.preventDefault();
      e.stopPropagation();
      const dropdown = link.closest('.dropdown');
      const isOpen = dropdown.classList.contains('mob-open');
      document.querySelectorAll('.nav-list .dropdown').forEach(d => d.classList.remove('mob-open'));
      if (!isOpen) dropdown.classList.add('mob-open');
    });
  });
});
</script>

<!-- Subsidiaries Loading -->
<script>
const esc = s => String(s || '')
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;');

(async () => {
  const grid = document.getElementById('subs-grid');
  const BASE = 'https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production';
  const q = `*[_type=="subsidiary"]|order(order asc){"slug":slug.current,name,tagline,sector,"desc":pt::text(description),"imgUrl":coverImage.asset->url}`;

  try {
    const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error('Sanity fetch failed');
    const data = await res.json();
    const subs = data.result || [];

    if (!subs.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: span 3; text-align: center; padding: 6rem 1rem;">
          <i class="fas fa-building" style="font-size: 4rem; color: var(--muted); opacity: 0.5;"></i>
          <p style="margin: 1.5rem 0;">No subsidiaries found yet.</p>
          <p style="font-size: 0.95rem; color: var(--muted);">Add subsidiaries in <a href="https://leveneenergy-studio.sanity.studio" target="_blank" style="color: var(--green); font-weight: 600;">Sanity Studio</a></p>
        </div>`;
      return;
    }

    grid.innerHTML = subs.map(s => {
      const href = `subsidiary.html?slug=${esc(s.slug)}`;
      const srcQ = s.imgUrl ? `${s.imgUrl}?w=600&auto=format&fit=crop&q=80` : null;

      return `
      <article class="sub-card" onclick="location.href='${href}'" style="cursor: pointer;">
        <div class="sub-card-img">
          ${srcQ 
            ? `<img src="${srcQ}" alt="${esc(s.name)}" loading="lazy"/>` 
            : `<div class="placeholder"><i class="fas fa-industry"></i></div>`}
          <span class="sub-card-sector">${esc(s.sector || '')}</span>
        </div>
        <div class="sub-card-body">
          <h2 class="sub-card-name">${esc(s.name)}</h2>
          <p class="sub-card-desc">${esc(s.desc || s.tagline || 'Leading innovation in the energy sector.')}</p>
          <a href="${href}" class="sub-card-link" onclick="event.stopPropagation()">
            View details <i class="fas fa-arrow-right"></i>
          </a>
        </div>
      </article>`;
    }).join('');
  } catch (err) {
    console.error('Failed to load subsidiaries:', err);
    grid.innerHTML = `
      <div style="grid-column: span 3; text-align: center; padding: 6rem 1rem; color: var(--muted);">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
        <p>Failed to load subsidiaries. Please try again later.</p>
      </div>`;
  }
})();
</script>

</body>
</html>
