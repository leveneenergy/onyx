<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Team - Levene Energies Limited</title>
    <meta name="description" content="Meet the Executive Team of Levene Energies Limited — operational leaders driving growth across energy, trading, and renewables." />
    <meta name="keywords" content="executive team, management, leadership, Levene Energies" />
    <meta name="author" content="Levene Energies Limited" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Executive Team - Levene Energies Limited" />
    <meta property="og:description" content="Meet the Executive Team of Levene Energies Limited." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Levene Energies Limited" />
    <link rel="shortcut icon" href="./image/levene-energies.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/management.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>

  <body class="mgt-page">
    <div id="header-placeholder"></div>
    <script>
      fetch("header.html")
        .then(r => { if (!r.ok) throw new Error("Header not found"); return r.text(); })
        .then(html => {
          document.getElementById("header-placeholder").innerHTML = html;
          initNav();
        })
        .catch(err => console.error("Failed to load header:", err));

      function initNav() {
        const hamburger = document.getElementById("hamburger");
        const navList   = document.getElementById("nav-list");
        const navClose  = document.getElementById("nav-close");
        if (hamburger && navList) {
          hamburger.addEventListener("click", function(e) {
            e.stopPropagation();
            navList.classList.add("open");
            document.body.style.overflow = "hidden";
          });
        }
        if (navClose) {
          navClose.addEventListener("click", function() {
            navList.classList.remove("open");
            document.body.style.overflow = "";
            document.querySelectorAll(".nav-list .dropdown").forEach(d => d.classList.remove("mob-open"));
          });
        }
        document.addEventListener("click", function(e) {
          if (navList && navList.classList.contains("open")) {
            if (!navList.contains(e.target) && e.target !== hamburger) {
              navList.classList.remove("open");
              document.body.style.overflow = "";
              document.querySelectorAll(".nav-list .dropdown").forEach(d => d.classList.remove("mob-open"));
            }
          }
        });
        document.querySelectorAll(".nav-list .dropdown > a").forEach(function(link) {
          link.addEventListener("click", function(e) {
            if (window.innerWidth > 768) return;
            e.preventDefault(); e.stopPropagation();
            var dropdown = link.closest(".dropdown");
            var isOpen = dropdown.classList.contains("mob-open");
            document.querySelectorAll(".nav-list .dropdown").forEach(d => d.classList.remove("mob-open"));
            if (!isOpen) dropdown.classList.add("mob-open");
          });
        });
        document.querySelectorAll(".nav-list > li:not(.dropdown) > a").forEach(function(link) {
          link.addEventListener("click", function() {
            if (window.innerWidth > 768) return;
            navList.classList.remove("open");
            document.body.style.overflow = "";
          });
        });
      }
    </script>

    <!-- Page Hero -->
    <section class="page-hero">
      <div class="page-hero-inner">
        <div class="section-label">Management Team</div>
        <h1>Executive Team</h1>
        <p>Operational leaders driving performance, innovation, and sustainable growth across Levene Energies' business units.</p>
        <div class="breadcrumb">
          <a href="management.html">Our Management</a><span>/</span><span>Executive Team</span>
        </div>
      </div>
    </section>

    <section class="team-section">
      <div class="team-section-inner">
        <div class="section-label">Meet The Executive Team</div>
        <div id="members-root">
          <div class="team-loading">
            <i class="fas fa-spinner fa-spin" style="color:var(--navy);opacity:0.4;"></i>
            <p>Loading Executive Team…</p>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>
    <script>
      fetch("footer.html")
        .then(r => r.ok ? r.text() : "")
        .then(html => { document.getElementById("footer-placeholder").innerHTML = html; })
        .catch(() => {});
    </script>

    <script>
      function esc(s) {
        return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function renderCards(members) {
        const root = document.getElementById("members-root");
        if (!members || members.length === 0) {
          root.innerHTML = `
            <div class="team-loading">
              <i class="fas fa-users" style="color:var(--navy);opacity:0.25;"></i>
              <p>Executive team profiles coming soon.</p>
            </div>`;
          return;
        }

        root.innerHTML = `<div class="members-grid" id="members-grid"></div>`;
        const grid = document.getElementById("members-grid");

        members.forEach((m, i) => {
          const photoHtml = m.photoUrl
            ? `<img src="${esc(m.photoUrl)}?w=600&auto=format&fit=crop&q=80" alt="${esc(m.name)}" loading="lazy" />`
            : `<div class="member-photo-placeholder"><i class="fas fa-user"></i></div>`;

          const linkedinHtml = m.linkedin
            ? `<a href="${esc(m.linkedin)}" target="_blank" rel="noopener noreferrer" class="member-linkedin" onclick="event.stopPropagation()">
                <i class="fab fa-linkedin"></i> LinkedIn
               </a>`
            : "";

          const card = document.createElement("div");
          card.className = "member-card";
          card.style.transitionDelay = `${(i % 4) * 0.08}s`;
          card.dataset.index = i;
          card.innerHTML = `
            <div class="member-photo-wrap">${photoHtml}</div>
            <div class="member-info">
              <div class="member-name">${esc(m.name)}</div>
              <div class="member-title">${esc(m.title || "")}</div>
              ${m.excerpt ? `<p class="member-excerpt">${esc(m.excerpt)}</p>` : ""}
              ${linkedinHtml}
            </div>`;

          // ── Updated: points to content/team-member.html ──
          card.addEventListener("click", () => {
            if (m.slug) window.location.href = `content/team-member.html?slug=${encodeURIComponent(m.slug)}`;
          });
          card.style.cursor = "pointer";
          grid.appendChild(card);
        });

        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add("revealed"); io.unobserve(e.target); }
          });
        }, { threshold: 0.1 });
        document.querySelectorAll(".member-card").forEach(c => io.observe(c));
      }

      (async () => {
        const BASE = "https://ilajnehi.apicdn.sanity.io/v2025-06-01/data/query/production";
        const q = `*[_type=="teamMember" && category=="executive-team"] | order(order asc) {
          _id, name, title, department, excerpt, linkedin,
          "slug": slug.current,
          "photoUrl": photo.asset->url
        }`;

        try {
          const res = await fetch(`${BASE}?query=${encodeURIComponent(q)}`);
          if (!res.ok) throw new Error("Fetch failed");
          const { result } = await res.json();
          renderCards(result || []);
        } catch (err) {
          console.error(err);
          document.getElementById("members-root").innerHTML = `
            <div class="team-loading">
              <i class="fas fa-exclamation-circle" style="color:var(--navy);opacity:0.3;font-size:2.8rem;"></i>
              <p>Unable to load executive team. Please try again later.</p>
            </div>`;
        }
      })();
    </script>
  </body>
</html>
